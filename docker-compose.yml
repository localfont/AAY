version: "3.9"

services:
  aar-api:
    build: ./api
    image: aar-api:latest
    container_name: aar-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - aar-data:/data
    environment:
      - AAR_DB=/data/aar.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  aar-data:
